<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#141e30,#243b55);
    }

    .calculator{
      width:350px;
      background:#1f2937;
      padding:20px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    .title{
      text-align:center;
      color:white;
      margin-bottom:15px;
      font-size:24px;
      font-weight:bold;
    }

    .display{
  width:100%;
  height:70px;
  border:none;
  outline:none;
  background:#111827;
  color:#00ffcc;
  font-size:24px;   /* Reduced from 32px */
  text-align:right;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  caret-color:#00ffcc;
  cursor:text;
}
    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

   button{
  height:60px;
  border:none;
  border-radius:12px;
  font-size:18px;   /* Reduced from 22px */
  cursor:pointer;
  transition:0.2s;
  font-weight:bold;
}
    button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    .number{
      background:#374151;
      color:white;
    }

    .operator{
      background:#f59e0b;
      color:white;
    }

    .equal{
      background:#10b981;
      color:white;
      grid-column:span 2;
    }

    .clear{
      background:#ef4444;
      color:white;
    }

    .special{
      background:#6366f1;
      color:white;
    }

    .history{
      margin-top:20px;
      background:#111827;
      color:white;
      padding:10px;
      border-radius:12px;
      max-height:120px;
      overflow-y:auto;
    }

    .history h3{
      margin-bottom:10px;
      color:#00ffcc;
    }

    .history p{
      margin-bottom:5px;
      font-size:14px;
    }

  </style>
</head>
<body>

  <div class="calculator">
    <div class="title">Advanced Calculator</div>

    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="clear" onclick="clearHistory()">Clear History</button>
      <button class="special" onclick="deleteLast()">DEL</button>
      <button class="special" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="special" onclick="square()">x²</button>
      <button class="number" onclick="appendValue('0')">0</button>
      <button class="special" onclick="appendValue('.')">.</button>
      <button class="operator" onclick="sqrtValue()">√</button>
      <button class="special" onclick="power()">xʸ</button>
<button class="special" onclick="cube()">x³</button>
<button class="special" onclick="factorial()">n!</button>
<button class="special" onclick="sinValue()">sin</button>

<button class="special" onclick="cosValue()">cos</button>
<button class="special" onclick="tanValue()">tan</button>
<button class="special" onclick="logValue()">log</button>
<button class="special" onclick="piValue()">π</button>

      <button class="equal" onclick="calculate()">=</button>
      <button class="special" onclick="toggleTheme()">Theme</button>

    </div>

    <div class="history">
      <h3>History</h3>
      <div id="historyList"></div>
    </div>

  </div>

  <script>

    let display = document.getElementById("display");
    let historyList = document.getElementById("historyList");
    let darkMode = true;

    function appendValue(value){
      display.value += value;
    }
    function clearHistory(){
  historyList.innerHTML = "";
}
function cube(){
  try{
    let value = eval(display.value);
    let result = value * value * value;

    addToHistory(value + "³ = " + result);

    display.value = result;
  }
  catch{
    display.value = "Error";
  }
}

function power(){
  appendValue("**");
}

function factorial(){

  try{
    let num = parseInt(display.value);

    if(num < 0){
      display.value = "Error";
      return;
    }

    let fact = 1;

    for(let i=1; i<=num; i++){
      fact *= i;
    }

    addToHistory(num + "! = " + fact);

    display.value = fact;
  }

  catch{
    display.value = "Error";
  }
}

function sinValue(){
  try{
    let value = eval(display.value);

    // Convert degree to radian
    let result = Math.sin(value * Math.PI / 180);

    addToHistory("sin(" + value + ") = " + result);

    display.value = result.toFixed(6);
  }
  catch{
    display.value = "Error";
  }
}

function cosValue(){
  try{
    let value = eval(display.value);

    // Convert degree to radian
    let result = Math.cos(value * Math.PI / 180);

    addToHistory("cos(" + value + ") = " + result);

    display.value = result.toFixed(6);
  }
  catch{
    display.value = "Error";
  }
}

function tanValue(){
  try{
    let value = eval(display.value);

    // Convert degree to radian
    let result = Math.tan(value * Math.PI / 180);

    addToHistory("tan(" + value + ") = " + result);

    display.value = result.toFixed(6);
  }
  catch{
    display.value = "Error";
  }
}

function logValue(){
  try{
    let value = eval(display.value);
    let result = Math.log10(value);

    addToHistory("log(" + value + ") = " + result);

    display.value = result;
  }
  catch{
    display.value = "Error";
  }
}

function piValue(){
  appendValue(Math.PI.toFixed(8));
}

    function clearDisplay(){
      display.value = "";
    }

    function deleteLast(){
      display.value = display.value.slice(0,-1);
    }

    function calculate(){
      try{
        let expression = display.value;
        let result = eval(expression);

        addToHistory(expression + " = " + result);

        display.value = result;
      }
      catch{
        display.value = "Error";
      }
    }

    function square(){
      try{
        let value = eval(display.value);
        let result = value * value;

        addToHistory(value + "² = " + result);

        display.value = result;
      }
      catch{
        display.value = "Error";
      }
    }

    function sqrtValue(){
      try{
        let value = eval(display.value);
        let result = Math.sqrt(value);

        addToHistory("√" + value + " = " + result);

        display.value = result;
      }
      catch{
        display.value = "Error";
      }
    }

    function addToHistory(text){
      let p = document.createElement("p");
      p.textContent = text;
      historyList.prepend(p);
    }

    function toggleTheme(){

      let calculator = document.querySelector(".calculator");
      let body = document.body;

      if(darkMode){
        body.style.background = "linear-gradient(135deg,#f6d365,#fda085)";
        calculator.style.background = "#ffffff";
        display.style.background = "#e5e7eb";
        display.style.color = "#111827";
      }
      else{
        body.style.background = "linear-gradient(135deg,#141e30,#243b55)";
        calculator.style.background = "#1f2937";
        display.style.background = "#111827";
        display.style.color = "#00ffcc";
      }

      darkMode = !darkMode;
    }

    // Keyboard Support
    document.addEventListener("keydown",(e)=>{

      if(!isNaN(e.key) || ['+','-','*','/','.','%'].includes(e.key)){
        appendValue(e.key);
      }

      else if(e.key === "Enter"){
        calculate();
      }

      else if(e.key === "Backspace"){
        deleteLast();
      }

      else if(e.key === "Escape"){
        clearDisplay();
      }

    });

  </script>

</body>
</html>
